<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECFSEC | Elite Code Fortification</title>
    <!-- React Engine -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel: Translates React code for the browser on the fly -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #d4d4d8; margin: 0; }
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 15s infinite alternate ease-in-out; }
        .nav-transition { transition: clip-path 0.7s cubic-bezier(0.86, 0, 0.07, 1); }
        .clip-circle-closed { clip-path: circle(0px at calc(100% - 3rem) 3rem); }
        .clip-circle-open { clip-path: circle(250% at calc(100% - 3rem) 3rem); }
        .glass-panel {
            background: rgba(5, 5, 5, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(39, 39, 42, 0.4);
        }
        .fade-in { animation: fadeIn 0.7s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- This script tells the browser to load and run your React code from App.js -->
    <script type="text/babel" data-type="module" src="app.js"></script>
</body>
</html>
